events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream odoo {
        server tkterp-app:8069;
    }

    server {
        listen 80;
        server_name localhost;

        # Add long-polling port for Odoo (Chat/Notifications)
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            # Maintenance Mode Check
            if (-f /etc/nginx/maintenance/MAINTENANCE_MODE) {
                return 503;
            }

            proxy_pass http://odoo;
        }

        # Restrict Database Manager Access (Optional but Recommended for Prod)
        # You can uncomment these lines on the VPS to block external access to the DB manager
        # location /web/database/manager {
        #    allow 127.0.0.1; 
        #    deny all;
        #    proxy_pass http://odoo;
        # }

        # Error page for 503 (Maintenance)
        error_page 503 /maintenance.html;
        location = /maintenance.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
