name: Deploy TKTErp to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Ensure project directory exists
            mkdir -p ~/projects/tkterp
            cd ~/projects/tkterp

            # 2. Pull latest code (if git is initialized)
            if [ -d .git ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git .
            fi

            # 3. Create .env file from Granular GitHub Secrets
            cat <<EOF > .env
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            ODOO_ADMIN_PASSWORD=${{ secrets.ODOO_ADMIN_PASSWORD }}
            ODOO_DB_HOST=tkterp-db
            ODOO_DB_USER=${{ secrets.POSTGRES_USER }}
            ODOO_DB_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}

            # SMTP (Email) Configuration
            SMTP_SERVER=${{ secrets.SMTP_SERVER }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            SMTP_SSL=${{ secrets.SMTP_SSL }}
            EOF

            # 4. Ensure data directories exist with correct permissions
            mkdir -p tkterp-db-data tkterp-data tkterp-addons nginx/html nginx/maintenance
            chmod -R 777 tkterp-db-data tkterp-data tkterp-addons nginx/maintenance

            # 5. Link Quadlets to systemd (User mode)
            mkdir -p ~/.config/containers/systemd
            ln -sf $(pwd)/*.container ~/.config/containers/systemd/
            ln -sf $(pwd)/*.network ~/.config/containers/systemd/

            # 6. Enable Maintenance Mode
            touch nginx/maintenance/MAINTENANCE_MODE

            # 7. Reload and Restart
            systemctl --user daemon-reload
            systemctl --user restart tkterp-app.service tkterp-proxy.service

            # 8. Wait for Odoo to start (optional but recommended)
            # sleep 5 

            # 9. Disable Maintenance Mode
            rm -f nginx/maintenance/MAINTENANCE_MODE
