services:
  tkterp-db:
    image: docker.io/library/postgres:18-alpine
    container_name: tkterp-db
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - ./tkterp-db-data:/var/lib/postgresql:U,Z
    networks:
      - tkterp-net

  tkterp-app:
    build: ./docker/odoo
    container_name: tkterp-app
    env_file: .env
    environment:
      # Dev mode enables live SCSS/Python reload. Remove for production.
      - ODOO_DEV=all,assets
    volumes:
      - ./odoo.conf:/etc/odoo/odoo.conf:Z
      - ./tkterp_addons:/mnt/extra-addons:Z
      - ./tkterp_scripts:/scripts:Z
      - ./tkterp-data:/var/lib/odoo:U,Z
    depends_on:
      - tkterp-db
    networks:
      - tkterp-net

  tkterp-proxy:
    image: docker.io/library/nginx:alpine
    container_name: tkterp-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,Z
      - ./nginx/html:/usr/share/nginx/html:ro,Z
      - ./nginx/maintenance:/etc/nginx/maintenance:ro,Z
    depends_on:
      - tkterp-app
    networks:
      - tkterp-net

networks:
  tkterp-net:
    driver: bridge
